# Welcome to Jekyll!
#
# This config file is meant for settings that affect your whole blog, values
# which you are expected to set up once and rarely edit after that. If you find
# yourself editing this file very often, consider using Jekyll's data files
# feature for the data you need to update frequently.
#
# For technical reasons, this file is *NOT* reloaded automatically when you use
# 'bundle exec jekyll serve'. If you change this file, please restart the server process.
#
# If you need help with YAML syntax, here are some quick references for you: 
# https://learn-the-web.algonquindesign.ca/topics/markdown-yaml-cheat-sheet/#yaml
# https://learnxinyminutes.com/docs/yaml/
#
# Site settings
# These are used to personalize your new site. If you look in the HTML files,
# you will see them accessed via {{ site.title }}, {{ site.email }}, and so on.
# You can create any custom variable you would like, and they will be accessible
# in the templates via {{ site.myvariable }}.

sass:
  sass_dir: assets/css

owner_name: Odravison Amaral

## SEO Information
title: "Call me Odra" # the name of your site, e.g. ACME Corp.
tagline: "An awesome tagline"
email: oamaraljr@gmail.com
description: >- # this means to ignore newlines until "baseurl:"
 ODravison SITE DESCRIPTION
author: Odravison Amaral
url: "https://odravison.github.io" # the base hostname & protocol for your site, e.g. http://example.com
baseurl: "/" # the subpath of your site, e.g. /blog
google_analytics: UA-111111111-1
twitter:
  username: 
  card: summary #keep this to generate a twitter share card

about_me: 
  short_resume: Experienced software engineer, originally from Brazil. I'm dedicated to impact people lives with great software solutions by doing my best in everything that I do. I’m curious about technology and everything that surround it, I have worked as developer and engineer crafting highly tested, scalable and efficient distributed systems to people whose uses software as a daily solution tool across the globe. In addiction, my soft-skills are part of my core competences. To listen, be understood and be humble while learning or teaching someone, is the foundation of my soft-skills.

github:
  owner_name: Odravison Amaral
  owner_url: https://github.com/odravison
  repository_page_url: https://github.com/odravison/odravison.github.io
  repository_page_name: odravison.github.io
  profile_pic: https://avatars.githubusercontent.com/u/7316524?v=4

# Build settings
plugins:
  - jekyll
  - jekyll-feed
  - jekyll-seo-tag
  - jemoji
  # - jekyll-autoprefixer
  - jekyll-sitemap

# Exclude from processing.
# The following items will not be processed, by default.
# Any item listed under the `exclude:` key here will be automatically added to
